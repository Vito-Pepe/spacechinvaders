<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>VAPORWAVE INVADERS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="wrapper">
    <div id="hud">
      <span id="h-score">SCORE: 0</span>
      <span id="h-hi">HI-SCORE: 0</span>
      <span id="h-lives">♥ ♥ ♥</span>
    </div>
    <div id="canvas-wrap">
      <canvas id="c"></canvas>
      <div id="overlay-box">
        <div class="ov-label">PILOT NAME</div>
        <input id="name-input" maxlength="8" autocomplete="off" spellcheck="false" placeholder="PLAYER" />
        <button class="abtn" id="btn-start" type="button">▶ START</button>
      </div>
    </div>
    <div id="game-actions">
      <button class="abtn" id="btn-reset" type="button">⟲ RESET</button>
      <button class="abtn" id="btn-pause" type="button">⏸ PAUSE</button>
      <button class="abtn" id="btn-music" type="button">♪ MUSIC</button>
      <button class="abtn" id="btn-menu"  type="button">⌂ MENU</button>
    </div>
    <div id="controls">
      <div class="cbtn" id="btn-left">◀</div>
      <div class="cbtn" id="btn-fire">FIRE</div>
      <div class="cbtn" id="btn-right">▶</div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
